<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLB Stat Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: #1a3a1a;
      color: #f0f0e0;
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 4px
        );
    }

 */ HEADER     /* 
    header {
      background: #0e2a0e;
      border-bottom: 4px solid #5a8a2a;
      padding: 18px 32px;
      text-align: center;
      position: relative;
    }
    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #f0f0e0;
      text-shadow: 0 0 20px rgba(90,138,42,0.6);
    }
    header .subtitle {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #8ab84a;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .bulb-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    .bulb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #8ab84a;
      box-shadow: 0 0 6px #8ab84a;
      animation: flicker 3s infinite;
    }
    .bulb:nth-child(2) { animation-delay: 0.4s; }
    .bulb:nth-child(3) { animation-delay: 0.8s; }
    .bulb:nth-child(4) { animation-delay: 1.2s; }
    .bulb:nth-child(5) { animation-delay: 1.6s; }
    .bulb:nth-child(6) { animation-delay: 2.0s; }
    .bulb:nth-child(7) { animation-delay: 0.2s; }
    @keyframes flicker {
      0%,90%,100% { opacity:1; }
      93% { opacity:0.5; }
    }

 */ TABS     /* 
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      background: #0e2a0e;
      border-bottom: 2px solid #2a5a2a;
      padding: 0 32px;
    }
    .tab {
      padding: 12px 32px;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6a9a3a;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #f0f0e0; border-bottom-color: #8ab84a; }
    .tab:hover:not(.active) { color: #aad06a; }

 */ LAYOUT     /* 
    .page { display: none; padding: 32px; max-width: 860px; margin: 0 auto; }
    .page.active { display: block; }

  */SEARCH PANEL     /* 
    .scoreboard-panel {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .panel-label {
      background: #2a5a2a;
      padding: 8px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c0e080;
    }
    .panel-body { padding: 20px; }

    .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .input-row input, .input-row select {
      flex: 1;
      min-width: 150px;
      padding: 10px 14px;
      background: #162e16;
      border: 1px solid #3a6a3a;
      border-radius: 2px;
      color: #f0f0e0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
    .input-row input::placeholder { color: #4a7a4a; }
    .input-row input:focus, .input-row select:focus {
      outline: none;
      border-color: #8ab84a;
      box-shadow: 0 0 8px rgba(138,184,74,0.3);
    }
    .input-row select option { background: #0e2a0e; }

    button.search-btn {
      padding: 10px 24px;
      background: #2a5a2a;
      color: #f0f0e0;
      border: 1px solid #5a8a2a;
      border-radius: 2px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.search-btn:hover { background: #3a7a3a; box-shadow: 0 0 10px rgba(138,184,74,0.3); }

 */ PICKER     /* 
    #picker {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    #picker .panel-label { background: #1a4a1a; }
    #picker-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .match-btn {
      background: #162e16;
      border: 1px solid #2a5a2a;
      border-radius: 2px;
      color: #f0f0e0;
      padding: 10px 16px;
      text-align: left;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .match-btn:hover { border-color: #8ab84a; background: #1e3e1e; }
    .match-btn .match-team { color: #6a9a3a; font-size: 0.8rem; margin-top: 3px; }

  */STATS CARD     /* 
    #stats-card {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Scoreboard header row */
    .card-header {
      background: #162e16;
      border-bottom: 2px solid #2a5a2a;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0f0e0;
      text-shadow: 0 0 12px rgba(138,184,74,0.4);
    }
    .player-meta { color: #6a9a3a; font-size: 0.8rem; letter-spacing: 2px; margin-top: 4px; }
    .season-badge {
      background: #2a5a2a;
      border: 1px solid #5a8a2a;
      border-radius: 2px;
      padding: 6px 14px;
      text-align: center;
    }
    .season-badge .yr { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: #c0e080; letter-spacing: 2px; }
    .season-badge .as-of { font-size: 0.65rem; color: #6a9a3a; letter-spacing: 1px; margin-top: 2px; }

    /* Stat  scoreboard style */rows 
    .stat-section { padding: 16px 20px; }
    .stat-section + .stat-section { border-top: 1px solid #1e4e1e; }
    .stat-section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: #8ab84a;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* The actual scoreboard grid */
    .scoreboard-row {
      display: flex;
      border: 1px solid #2a5a2a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .sb-cell {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border-right: 1px solid #2a5a2a;
      background: #162e16;
    }
    .sb-cell:last-child { border-right: none; }
    .sb-cell .sb-val {
      font-size: 1.35rem;
      font-weight: 700;
      color: #f0f0e0;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(240,240,224,0.2);
    }
    .sb-cell .sb-lbl {
      font-size: 0.6rem;
      color: #5a8a3a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    /* Highlight key stats */
    .sb-cell.key { background: #1a3a1a; }
    .sb-cell.key .sb-val { color: #c0e080; text-shadow: 0 0 12px rgba(192,224,128,0.4); }

 */ LEADERS     /* 
    .leaders-board {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    .leaders-title {
      background: #162e16;
      border-bottom: 2px solid #2a5a2a;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .leaders-title .lt-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0f0e0;
    }
    .leaders-title .lt-range { color: #6a9a3a; font-size: 0.8rem; letter-spacing: 2px; }

    .leaders-header {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 70px 60px;
      padding: 8px 20px;
      background: #1a4a1a;
      border-bottom: 1px solid #2a5a2a;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #5a8a3a;
      text-transform: uppercase;
    }
    .leader-row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr 70px 60px;
      padding: 14px 20px;
      border-bottom: 1px solid #162e16;
      align-items: center;
      transition: background 0.15s;
    }
    .leader-row:last-child { border-bottom: none; }
    .leader-row:hover { background: #162e16; }
    .leader-rank {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: #8ab84a;
    }
    .leader-name { font-size: 0.9rem; color: #f0f0e0; }
    .leader-team { font-size: 0.78rem; color: #5a8a3a; }
    .leader-value {
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      color: #c0e080;
      text-align: right;
      text-shadow: 0 0 8px rgba(192,224,128,0.3);
    }
    .leader-season { font-size: 0.75rem; color: #5a8a3a; text-align: right; }

    .error-msg {
      background: #2a1a0e;
      border: 1px solid #6a3a0e;
      border-radius: 4px;
      padding: 14px 20px;
      color: #e0a060;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .spinner {
      text-align: center;
      padding: 40px;
      color: #4a7a4a;
      letter-spacing: 3px;
      font-size: 0.85rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>&#9864; MLB Stat Engine</h1>
  <div class="subtitle">Fenway Park &mdash; Boston, MA</div>
  <div class="bulb-row">
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('player')">Player Lookup</div>
  <div class="tab" onclick="switchTab('leaders')">Leaders Board</div>
</div>

<!-- PLAYER TAB -->
<div id="tab-player" class="page active">
  <div class="scoreboard-panel">
    <div class="panel-label">Search Player</div>
    <div class="panel-body">
      <div class="input-row">
        <input id="player-name" type="text" placeholder="Player name..." />
        <input id="player-year" type="text" placeholder="Year" maxlength="4" style="max-width:110px"/>
        <button class="search-btn" onclick="searchPlayer()">Search</button>
      </div>
    </div>
  </div>

  <div id="picker" class="hidden">
    <div class="panel-label">Multiple Players Found &mdash; Select One</div>
    <div id="picker-list"></div>
  </div>

  <div id="player-result" class="hidden"></div>
</div>

<!-- LEADERS TAB -->
<div id="tab-leaders" class="page">
  <div class="scoreboard-panel">
    <div class="panel-label">Leaders Board</div>
    <div class="panel-body">
      <div class="input-row">
        <input id="start-year" type="text" placeholder="Start year" maxlength="4" style="max-width:120px"/>
        <input id="end-year" type="text" placeholder="End year" maxlength="4" style="max-width:120px"/>
        <select id="stat-type">
          <option value="AVG">Batting Average (AVG)</option>
          <option value="ERA">ERA (Lowest)</option>
        </select>
        <button class="search-btn" onclick="searchLeaders()">Search</button>
      </div>
    </div>
  </div>

  <div id="leaders-result"></div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['player','leaders'][i] === tab);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  }

  document.getElementById('player-name').addEventListener('keydown', e => { if (e.key === 'Enter') searchPlayer(); });
  document.getElementById('player-year').addEventListener('keydown', e => { if (e.key === 'Enter') searchPlayer(); });

  let pendingName = '', pendingYear = '';

  async function searchPlayer(teamHint) {
    const name = teamHint ? pendingName : document.getElementById('player-name').value.trim();
    const year = teamHint ? pendingYear : document.getElementById('player-year').value.trim();
    if (!name || !year) return;
    pendingName = name; pendingYear = year;

    const resultEl = document.getElementById('player-result');
    const pickerEl = document.getElementById('picker');
    resultEl.classList.add('hidden');
    pickerEl.classList.add('hidden');
    resultEl.innerHTML = '<div class="spinner">[ LOADING... ]</div>';
    resultEl.classList.remove('hidden');

    const params = new URLSearchParams({ name, year });
    if (teamHint) params.append('team', teamHint);
    const data = await fetch('/api/player?' + params).then(r => r.json());

    resultEl.classList.add('hidden');
    resultEl.innerHTML = '';

    if (data.multipleMatches) {
      const list = document.getElementById('picker-list');
      list.innerHTML = '';
      data.multipleMatches.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'match-btn';
        btn.innerHTML = `<div>${m.fullName}</div><div class="match-team">${m.team || 'No stats in ' + year}</div>`;
        btn.onclick = () => searchPlayer(m.team || m.fullName);
        list.appendChild(btn);
      });
      pickerEl.classList.remove('hidden');
      return;
    }

    if (data.error) {
      resultEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
      resultEl.classList.remove('hidden');
      return;
    }

    resultEl.innerHTML = renderPlayerCard(data);
    resultEl.classList.remove('hidden');
  }

  function cell(val, label, key) {
    return `<div class="sb-cell${key ? ' key' : ''}">
      <div class="sb-val">${val}</div>
      <div class="sb-lbl">${label}</div>
    </div>`;
  }

  function renderPlayerCard(d) {
    let html = `
      <div id="stats-card">
        <div class="card-header">
          <div>
            <div class="player-name">${d.fullName}</div>
            <div class="player-meta">${d.position} &nbsp;/&nbsp; ${d.team}</div>
          </div>
          <div class="season-badge">
            <div class="yr">${d.season}</div>
            <div class="as-of">${d.asOf}</div>
          </div>
        </div>`;

    if (d.hitting) {
      const h = d.hitting;
      html += `
        <div class="stat-section">
          <div class="stat-section-label">&#9644; Hitting</div>
          <div class="scoreboard-row">
            ${cell(h.avg,'AVG',true)}${cell(h.ops,'OPS',true)}${cell(h.obp,'OBP')}${cell(h.slg,'SLG')}${cell(h.homeRuns,'HR',true)}
          </div>
          <div class="scoreboard-row">
            ${cell(h.rbi,'RBI')}${cell(h.runs,'R')}${cell(h.stolenBases,'SB')}${cell(h.strikeOuts,'K')}${cell(h.games,'G')}
          </div>
        </div>`;
    }

    if (d.pitching) {
      const p = d.pitching;
      html += `
        <div class="stat-section">
          <div class="stat-section-label">&#9644; Pitching</div>
          <div class="scoreboard-row">
            ${cell(p.era,'ERA',true)}${cell(p.whip,'WHIP',true)}${cell(p.inningsPitched,'IP')}${cell(p.wins+'-'+p.losses,'W-L')}
          </div>
          <div class="scoreboard-row">
            ${cell(p.strikeOuts,'SO')}${cell(p.walks,'BB')}${cell(p.games,'G')}
          </div>
        </div>`;
    }

    html += `</div>`;
    return html;
  }

  async function searchLeaders() {
    const startYear = document.getElementById('start-year').value.trim();
    const endYear = document.getElementById('end-year').value.trim();
    const statType = document.getElementById('stat-type').value;
    if (!startYear || !endYear) return;

    const resultEl = document.getElementById('leaders-result');
    resultEl.innerHTML = '<div class="spinner">[ LOADING... ]</div>';

    const params = new URLSearchParams({ startYear, endYear, stat: statType });
    const data = await fetch('/api/leaders?' + params).then(r => r.json());

    if (data.error) {
      resultEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
      return;
    }

    resultEl.innerHTML = `
      <div class="leaders-board">
        <div class="leaders-title">
          <span class="lt-name">${data.title}</span>
          <span class="lt-range">${data.yearRange}</span>
        </div>
        <div class="leaders-header">
          <span>#</span><span>Player</span><span>Team</span><span style="text-align:right">${data.statLabel}</span><span style="text-align:right">Season</span>
        </div>
        ${data.leaders.map(l => `
          <div class="leader-row">
            <div class="leader-rank">${l.rank}</div>
            <div class="leader-name">${l.playerName}</div>
            <div class="leader-team">${l.team}</div>
            <div class="leader-value">${l.value}</div>
            <div class="leader-season">${l.season}</div>
          </div>`).join('')}
      </div>`;
  }
</script>
</body>
</html>
