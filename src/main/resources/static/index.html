<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLB Stat Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: #1a3a1a;
      color: #f0f0e0;
      min-height: 100vh;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
    }

    /* HEADER */
    header {
      background: #0e2a0e;
      border-bottom: 4px solid #5a8a2a;
      padding: 18px 32px;
      text-align: center;
    }
    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #f0f0e0;
      text-shadow: 0 0 20px rgba(90,138,42,0.6);
    }
    header .subtitle {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #8ab84a;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .bulb-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    .bulb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #8ab84a;
      box-shadow: 0 0 6px #8ab84a;
      animation: flicker 3s infinite;
    }
    .bulb:nth-child(2) { animation-delay: 0.4s; }
    .bulb:nth-child(3) { animation-delay: 0.8s; }
    .bulb:nth-child(4) { animation-delay: 1.2s; }
    .bulb:nth-child(5) { animation-delay: 1.6s; }
    .bulb:nth-child(6) { animation-delay: 2.0s; }
    .bulb:nth-child(7) { animation-delay: 0.2s; }
    @keyframes flicker {
      0%,90%,100% { opacity:1; }
      93% { opacity:0.5; }
    }

    /* MAIN  two columns */LAYOUT 
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      padding: 28px 32px;
      max-width: 1300px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* PANELS */
    .scoreboard-panel {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .panel-label {
      background: #2a5a2a;
      padding: 8px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c0e080;
    }
    .panel-body { padding: 20px; }

    /* INPUTS */
    .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .input-row input, .input-row select {
      flex: 1;
      min-width: 120px;
      padding: 10px 14px;
      background: #162e16;
      border: 1px solid #3a6a3a;
      border-radius: 2px;
      color: #f0f0e0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
    .input-row input::placeholder { color: #4a7a4a; }
    .input-row input:focus, .input-row select:focus {
      outline: none;
      border-color: #8ab84a;
      box-shadow: 0 0 8px rgba(138,184,74,0.3);
    }
    .input-row select option { background: #0e2a0e; }
    button.search-btn {
      padding: 10px 24px;
      background: #2a5a2a;
      color: #f0f0e0;
      border: 1px solid #5a8a2a;
      border-radius: 2px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    button.search-btn:hover { background: #3a7a3a; box-shadow: 0 0 10px rgba(138,184,74,0.3); }

    /*  rendered dynamically, hidden until needed */PICKER 
    #picker {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #picker-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .match-btn {
      background: #162e16;
      border: 1px solid #2a5a2a;
      border-radius: 2px;
      color: #f0f0e0;
      padding: 10px 16px;
      text-align: left;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .match-btn:hover { border-color: #8ab84a; background: #1e3e1e; }
    .match-btn .match-team { color: #6a9a3a; font-size: 0.8rem; margin-top: 3px; }

    /* STATS CARD */
    #stats-card {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Player photo panel */
    .player-photo-panel {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .player-photo-panel .panel-label { width: 100%; text-align: center; }
    .player-photo-panel img {
      width: 100%;
      max-width: 220px;
      display: block;
      padding: 12px;
      filter: sepia(20%) contrast(1.05);
    }
    .player-photo-panel img.photo-error {
      opacity: 0.3;
      padding: 32px;
    }

    /* Wrapper: stats left, photo right */
    .result-with-photo {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .result-with-photo { grid-template-columns: 1fr; }
    }
    .card-header {
      background: #162e16;
      border-bottom: 2px solid #2a5a2a;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0f0e0;
      text-shadow: 0 0 12px rgba(138,184,74,0.4);
    }
    .player-meta { color: #6a9a3a; font-size: 0.8rem; letter-spacing: 2px; margin-top: 4px; }
    .season-badge {
      background: #2a5a2a;
      border: 1px solid #5a8a2a;
      border-radius: 2px;
      padding: 6px 14px;
      text-align: center;
    }
    .season-badge .yr { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: #c0e080; letter-spacing: 2px; }
    .season-badge .as-of { font-size: 0.65rem; color: #6a9a3a; letter-spacing: 1px; margin-top: 2px; }

    /* SCOREBOARD ROWS */
    .stat-section { padding: 16px 20px; }
    .stat-section + .stat-section { border-top: 1px solid #1e4e1e; }
    .stat-section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: #8ab84a;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .scoreboard-row {
      display: flex;
      border: 1px solid #2a5a2a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .sb-cell {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border-right: 1px solid #2a5a2a;
      background: #162e16;
    }
    .sb-cell:last-child { border-right: none; }
    .sb-cell .sb-val {
      font-size: 1.35rem;
      font-weight: 700;
      color: #f0f0e0;
      letter-spacing: 1px;
    }
    .sb-cell .sb-lbl {
      font-size: 0.6rem;
      color: #5a8a3a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .sb-cell.key { background: #1a3a1a; }
    .sb-cell.key .sb-val { color: #c0e080; text-shadow: 0 0 12px rgba(192,224,128,0.4); }

    /* LEADERS BOARD */
    .leaders-board {
      background: #0e2a0e;
      border: 2px solid #2a5a2a;
      border-radius: 4px;
      overflow: hidden;
    }
    .leaders-title {
      background: #162e16;
      border-bottom: 2px solid #2a5a2a;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .leaders-title .lt-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0f0e0;
    }
    .leaders-title .lt-range { color: #6a9a3a; font-size: 0.8rem; letter-spacing: 2px; }
    .leaders-header {
      display: grid;
      grid-template-columns: 32px 1fr 60px 52px;
      padding: 8px 16px;
      background: #1a4a1a;
      border-bottom: 1px solid #2a5a2a;
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: #5a8a3a;
      text-transform: uppercase;
    }
    .leader-row {
      display: grid;
      grid-template-columns: 32px 1fr 60px 52px;
      padding: 12px 16px;
      border-bottom: 1px solid #162e16;
      align-items: center;
      transition: background 0.15s;
    }
    .leader-row:last-child { border-bottom: none; }
    .leader-row:hover { background: #162e16; }
    .leader-rank { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: #8ab84a; }
    .leader-info .leader-name {
      font-size: 0.85rem;
      color: #f0f0e0;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: #3a6a3a;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .leader-info .leader-name:hover { color: #c0e080; text-decoration-color: #8ab84a; }
    .leader-info .leader-team { font-size: 0.72rem; color: #5a8a3a; margin-top: 2px; }
    .leader-value {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: #c0e080;
      text-align: right;
      text-shadow: 0 0 8px rgba(192,224,128,0.3);
    }
    .leader-season { font-size: 0.72rem; color: #5a8a3a; text-align: right; }

    .error-msg {
      background: #2a1a0e;
      border: 1px solid #6a3a0e;
      border-radius: 4px;
      padding: 14px 20px;
      color: #e0a060;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .spinner {
      text-align: center;
      padding: 32px;
      color: #4a7a4a;
      letter-spacing: 3px;
      font-size: 0.85rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>MLB Stat Engine</h1>
  <h1>    </h1>
  <div class="bulb-row">
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
    <div class="bulb"></div>
  </div>
</header>

<div class="main-layout">

  <div class="left-col">
    <div class="scoreboard-panel">
      <div class="panel-label">Search Player</div>
      <div class="panel-body">
        <div class="input-row">
          <input id="player-name" type="text" placeholder="Player name..." />
          <input id="player-year" type="text" placeholder="Year" maxlength="4" style="max-width:100px"/>
          <button class="search-btn" onclick="searchPlayer()">Search</button>
        </div>
      </div>
    </div>

    <!-- Picker: fully injected by JS, only appears on multiple matches -->
    <div id="picker" class="hidden"></div>

    <div id="player-result" class="hidden"></div>
  </div>
  
  <div class="right-col">
    <div class="scoreboard-panel">
      <div class="panel-label">Leaders Board</div>
      <div class="panel-body">
        <div class="input-row">
          <input id="start-year" type="text" placeholder="Start year" maxlength="4"/>
          <input id="end-year" type="text" placeholder="End year" maxlength="4"/>
          <select id="stat-type">
            <option value="AVG">AVG</option>
            <option value="ERA">ERA — Starters</option>
            <option value="ERA_RP">ERA — Relievers</option>
          </select>
          <button class="search-btn" onclick="searchLeaders()">Go</button>
        </div>
      </div>
    </div>

    <div id="leaders-result"></div>
  </div>

</div>

<script>
  document.getElementById('player-name').addEventListener('keydown', e => { if (e.key === 'Enter') searchPlayer(); });
  document.getElementById('player-year').addEventListener('keydown', e => { if (e.key === 'Enter') searchPlayer(); });

  let pendingName = '', pendingYear = '';

  async function searchPlayer(teamHint) {
    const name = teamHint ? pendingName : document.getElementById('player-name').value.trim();
    const year = teamHint ? pendingYear : document.getElementById('player-year').value.trim();
    if (!name || !year) return;
    pendingName = name; pendingYear = year;

    const resultEl = document.getElementById('player-result');
    const pickerEl = document.getElementById('picker');
    pickerEl.classList.add('hidden');
    pickerEl.innerHTML = '';
    resultEl.innerHTML = '<div class="spinner">[ LOADING... ]</div>';
    resultEl.classList.remove('hidden');

    const params = new URLSearchParams({ name, year });
    if (teamHint) params.append('team', teamHint);
    const data = await fetch('/api/player?' + params).then(r => r.json());

    resultEl.classList.add('hidden');
    resultEl.innerHTML = '';

    if (data.multipleMatches) {
      // Build picker with label entirely in  only shown when neededJS 
      pickerEl.innerHTML = `
        <div class="panel-label">Multiple Players Found &mdash; Select One</div>
        <div id="picker-list" style="padding:12px;display:flex;flex-direction:column;gap:8px"></div>`;
      const list = pickerEl.querySelector('#picker-list');
      data.multipleMatches.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'match-btn';
        btn.innerHTML = `<div>${m.fullName}</div><div class="match-team">${m.team || 'No stats in ' + year}</div>`;
        btn.onclick = () => searchPlayer(m.team || m.fullName);
        list.appendChild(btn);
      });
      pickerEl.classList.remove('hidden');
      return;
    }

    if (data.error) {
      resultEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
      resultEl.classList.remove('hidden');
      return;
    }

    resultEl.innerHTML = renderPlayerCard(data);
    resultEl.classList.remove('hidden');
  }

  function cell(val, label, key) {
    return `<div class="sb-cell${key ? ' key' : ''}">
      <div class="sb-val">${val}</div>
      <div class="sb-lbl">${label}</div>
    </div>`;
  }

  function renderPlayerCard(d) {
    const photoUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${d.playerId}/headshot/67/current`;

    let statsHtml = `
      <div id="stats-card">
        <div class="card-header">
          <div>
            <div class="player-name">${d.fullName}</div>
            <div class="player-meta">${d.position} &nbsp;/&nbsp; ${d.team}</div>
          </div>
          <div class="season-badge">
            <div class="yr">${d.season}</div>
            <div class="as-of">${d.asOf}</div>
          </div>
        </div>`;

    if (d.hitting) {
      const h = d.hitting;
      statsHtml += `
        <div class="stat-section">
          <div class="stat-section-label">&#9644; Hitting</div>
          <div class="scoreboard-row">
            ${cell(h.avg,'AVG',true)}${cell(h.ops,'OPS',true)}${cell(h.obp,'OBP')}${cell(h.slg,'SLG')}${cell(h.homeRuns,'HR',true)}
          </div>
          <div class="scoreboard-row">
            ${cell(h.rbi,'RBI')}${cell(h.runs,'R')}${cell(h.stolenBases,'SB')}${cell(h.strikeOuts,'K')}${cell(h.games,'G')}
          </div>
        </div>`;
    }

    if (d.pitching) {
      const p = d.pitching;
      statsHtml += `
        <div class="stat-section">
          <div class="stat-section-label">&#9644; Pitching</div>
          <div class="scoreboard-row">
            ${cell(p.era,'ERA',true)}${cell(p.whip,'WHIP',true)}${cell(p.inningsPitched,'IP')}${cell(p.wins+'-'+p.losses,'W-L')}
          </div>
          <div class="scoreboard-row">
            ${cell(p.strikeOuts,'SO')}${cell(p.walks,'BB')}${cell(p.games,'G')}
          </div>
        </div>`;
    }

    if (d.careerBestAvg || d.careerBestEra) {
      statsHtml += `
        <div class="stat-section" style="border-top:1px solid #1e4e1e">
          <div class="stat-section-label">&#9733; Career Best</div>
          <div class="scoreboard-row">
            ${d.careerBestAvg ? cell(d.careerBestAvg, 'AVG', true) + cell(d.careerBestAvgYear, 'Season', true) : ''}
            ${d.careerBestEra ? cell(d.careerBestEra, 'ERA', true) + cell(d.careerBestEraYear, 'Season', true) : ''}
          </div>
        </div>`;
    }

    statsHtml += `</div>`;

    const photoHtml = `
      <div class="player-photo-panel">
        <div class="panel-label">Photo</div>
        <img src="${photoUrl}"
             alt="${d.fullName}"
             onerror="this.src='';this.classList.add('photo-error');this.alt='No photo';" />
      </div>`;

    return `<div class="result-with-photo">${statsHtml}${photoHtml}</div>`;
  }

  async function searchLeaders() {
    const startYear = document.getElementById('start-year').value.trim();
    const endYear = document.getElementById('end-year').value.trim();
    const statType = document.getElementById('stat-type').value;
    if (!startYear || !endYear) return;

    const resultEl = document.getElementById('leaders-result');
    resultEl.innerHTML = '<div class="spinner">[ LOADING... ]</div>';

    const params = new URLSearchParams({ startYear, endYear, stat: statType });
    const data = await fetch('/api/leaders?' + params).then(r => r.json());

    if (data.error) {
      resultEl.innerHTML = `<div class="error-msg">${data.error}</div>`;
      return;
    }

    resultEl.innerHTML = `
      <div class="leaders-board">
        <div class="leaders-title">
          <span class="lt-name">${data.title}</span>
          <span class="lt-range">${data.yearRange}</span>
        </div>
        <div class="leaders-header">
          <span>#</span><span>Player</span><span style="text-align:right">${data.statLabel}</span><span style="text-align:right">Season</span>
        </div>
        ${data.leaders.map(l => `
          <div class="leader-row">
            <div class="leader-rank">${l.rank}</div>
            <div class="leader-info">
              <div class="leader-name" onclick="loadPlayerFromLeader('${l.playerName.replace(/'/g, "\\'")}', '${l.season}')">${l.playerName}</div>
              <div class="leader-team">${l.team}</div>
            </div>
            <div class="leader-value">${l.value}</div>
            <div class="leader-season">${l.season}</div>
          </div>`).join('')}
      </div>`;
  }

  function loadPlayerFromLeader(name, year) {
    document.getElementById('player-name').value = name;
    document.getElementById('player-year').value = year;
    // Scroll to top so the result is visible
    window.scrollTo({ top: 0, behavior: 'smooth' });
    searchPlayer();
  }
</script>
</body>
</html>
