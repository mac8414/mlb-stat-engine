server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Graceful shutdown — finish in-flight requests, then exit
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=5s

# Logging
logging.level.org.example=INFO
logging.level.org.example.service.PlayerService=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/mlb-stat-engine.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
